<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Teachers' Day</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Animated Background -->
  <div class="background"></div>

  <!-- Floating Hearts -->
  <div class="hearts"></div>

  <!-- Floating Petals -->
  <div class="petals"></div>

  <!-- Music -->
  <audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mp3">
  </audio>

  <!-- Music Button -->
  <button class="music-btn" id="musicBtn">
    🎵 Play Music
  </button>

  <!-- Main Container -->
  <div class="container">

    <!-- Card -->
    <div class="card" id="card">

      <!-- Front -->
      <div class="card-front">
        <h1>Happy</h1>
        <h2>Teachers' Day</h2>

        <p>Click To Open ✨</p>
      </div>

      <!-- Inside -->
      <div class="card-inside">

        <div class="photo-frame">
          <img src="assets/img.jpeg" alt="Teacher Photo">
        </div>

        <h3>Dear Teacher 💖</h3>

        <p>
          “Dear Teacher, thank you for your patience, guidance, and kindness.
           Your support and dedication inspire us every day. 
           Happy Teachers’ Day!”
        </p>

        <button class="glow-btn">
          Thank You ✨
        </button>

      </div>

    </div>

  </div>

  <!-- Confetti -->
  <canvas id="confetti"></canvas>

  <script src="script.js"></script>

</body>
</html>
